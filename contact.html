<!DOCTYPE html>
<html lang="en">
<head>
<title>CONTACT – Luxury Travel & Property Questions</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="faq's-contact.css">
 </head>
<body datapage="contact">

<div class="container">
    <div class="visual-side">
        <img class="overlay-img" src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=1600" alt="Premium Office Space">
        <div class="brand-intro">
            <h1>Let’s refine <br>your vision.</h1>
            <p>Experience tailored solutions designed for the discerning few.</p>
        </div>
    </div>

    <div class="form-side">
        <div class="form-header">
            <p>Direct Inquiry</p>
            <h2 style="font-family: var(--serif); font-size: 2rem;">Start a Conversation</h2>
        </div>

        <form id="contactForm">
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" placeholder="e.g. Julian Sterling" required>
            </div>

            <div class="input-group">
                <label>Inquiry Type</label>
                <select>
                    <option>Private Client Services</option>
                    <option>Schedule Consultation</option>
                    <option>Press & Media</option>
                </select>
            </div>

            <div class="input-group">
                <label>Project Brief</label>
                <textarea rows="3" placeholder="How may we assist you?"></textarea>
            </div>

            <div class="input-group">
                <label>Preferred Callback Time (Optional)</label>
                <input type="text" placeholder="Tomorrow, 2:00 PM EST">
            </div>

            <button type="submit" class="btn-submit">Send Inquiry</button>
        </form>

        <div class="concierge-note">
            <img class="concierge-avatar" src="" alt="Concierge">
            <div>
                <p><strong>Meet Aryan,</strong> your dedicated concierge.</p>
                <p class="response-time">Typical response time: Under 2 hours.</p>
            </div>
        </div>
    </div>
</div>

<script src="faq's+contact.js"></script>
</body>
</html>
